[phases.setup]
nixPkgs = [
    "python311",
    "gcc",
    "libgbm",
    "nss",
    "atk",
    "at-spi2-atk",
    "libdrm",
    "libxcomposite",
    "libxdamage",
    "libxext",
    "libxfixes",
    "libxrandr",
    "libasound2",
    "libpangocairo-1.0-0",
    "chromium",
    "nspr",
    "xorg.libX11",
    "xorg.libxcb",
    "libxkbcommon",
    "mesa",
    "pango",
    "cairo",
    "alsa-lib"
]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "playwright install chromium",
    "playwright install-deps chromium"
]

[start]
cmd = "python app.py"

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.cache/ms-playwright"

